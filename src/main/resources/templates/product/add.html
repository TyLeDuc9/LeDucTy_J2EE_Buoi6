<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{product/_layout}">
<head><title>Thông tin sản phẩm</title></head>
<body>
<div layout:fragment="content">
    <h2 th:text="${product.id == null ? 'Thêm sản phẩm mới' : 'Cập nhật sản phẩm'}"></h2>
    <form th:action="@{/products/save}" th:object="${product}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Tên sản phẩm:</label>
            <input type="text" th:field="*{name}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Giá:</label>
            <input type="number" th:field="*{price}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">URL Hình ảnh:</label>
            <input type="text" th:field="*{image}" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Danh mục:</label>
            <select th:field="*{category}" class="form-control" required>
                <option value="">-- Chọn danh mục --</option>
                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
            </select>
        </div>
        <button type="submit" class="btn btn-success" th:text="${product.id == null ? 'Lưu sản phẩm' : 'Cập nhật'}"></button>
        <a th:href="@{/products}" class="btn btn-secondary">Hủy</a>
    </form>
</div>
</body>
</html>
