<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{product/_layout}">
<head><title>Thông tin danh mục</title></head>
<body>
<div layout:fragment="content">
    <h2 th:text="${category.id == 0 ? 'Thêm danh mục mới' : 'Cập nhật danh mục'}"></h2>
    <form th:action="@{/categories/save}" th:object="${category}" method="post" class="mt-4">
        <input type="hidden" th:field="*{id}">
        <div class="mb-3">
            <label class="form-label">Tên danh mục:</label>
            <input type="text" th:field="*{name}" class="form-control" placeholder="Nhập tên danh mục..." required>
        </div>
        <button type="submit" class="btn btn-success">Lưu danh mục</button>
        <a th:href="@{/categories}" class="btn btn-secondary">Hủy</a>
    </form>
</div>
</body>
</html>
