<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{product/_layout}">
<head><title>Danh sách sản phẩm</title></head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between mb-3">
        <h3>Danh sách sản phẩm</h3>
        <a th:href="@{/products/add}" class="btn btn-primary" sec:authorize="hasRole('ADMIN')">Thêm sản phẩm mới</a>
    </div>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>#</th><th>Tên</th><th>Hình ảnh</th><th>Giá</th><th>Danh mục</th>
            <th sec:authorize="hasRole('ADMIN')">Thao tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${products}">
            <td th:text="${product.id}"></td>
            <td th:text="${product.name}"></td>
            <td><img th:src="${product.image}" width="100" th:if="${product.image != null}"></td>
            <td th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
            <td th:text="${product.category != null ? product.category.name : 'N/A'}"></td>
            <td sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-warning btn-sm">Sửa</a>
                <a th:href="@{/products/delete/{id}(id=${product.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Bạn có chắc chắn muốn xóa?')">Xóa</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
